{% extends 'base.html' %}

{% block title %}Trip History - UniRide{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <div class="bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Trip History</h1>
        
        <!-- Filter Tabs -->
        <div class="flex space-x-2 mb-6 border-b">
            <button onclick="filterTrips('all')" id="filterAll" class="px-4 py-2 text-blue-600 border-b-2 border-blue-600">All Trips</button>
            <button onclick="filterTrips('completed')" id="filterCompleted" class="px-4 py-2 text-gray-600 hover:text-blue-600">Completed</button>
            <button onclick="filterTrips('cancelled')" id="filterCancelled" class="px-4 py-2 text-gray-600 hover:text-blue-600">Cancelled</button>
        </div>
        
        <!-- Trips List -->
        <div id="tripsList" class="space-y-4">
            <div class="text-center py-8 text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl"></i>
                <p class="mt-2">Loading trips...</p>
            </div>
        </div>
    </div>
</div>

<script>
let currentFilter = 'all';

async function loadTrips() {
    try {
        const response = await fetch('/trips/');
        const data = await response.json();
        
        let filteredTrips = data.trips;
        if (currentFilter === 'completed') {
            filteredTrips = data.trips.filter(t => t.status === 'completed');
        } else if (currentFilter === 'cancelled') {
            filteredTrips = data.trips.filter(t => t.status.includes('cancelled'));
        }
        
        renderTrips(filteredTrips);
    } catch (error) {
        console.error('Error loading trips:', error);
        document.getElementById('tripsList').innerHTML = `
            <div class="text-center py-8 text-red-500">
                <i class="fas fa-exclamation-circle text-2xl"></i>
                <p class="mt-2">Error loading trips. Please try again.</p>
            </div>
        `;
    }
}

function renderTrips(trips) {
    const container = document.getElementById('tripsList');
    
    if (trips.length === 0) {
        container.innerHTML = `
            <div class="text-center py-8 text-gray-500">
                <i class="fas fa-car text-4xl mb-2"></i>
                <p>No trips found</p>
                <a href="/" class="text-blue-600 hover:underline mt-2 inline-block">Book a ride</a>
            </div>
        `;
        return;
    }
    
    container.innerHTML = trips.map(trip => `
        <div class="border rounded-lg p-4 hover:shadow-md transition">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <div class="flex items-center mb-2">
                        <span class="px-2 py-1 text-xs rounded-full ${getStatusColor(trip.status)}">
                            ${trip.status.replace('_', ' ').toUpperCase()}
                        </span>
                        <span class="text-sm text-gray-500 ml-2">${new Date(trip.requested_at).toLocaleDateString()}</span>
                    </div>
                    <div class="space-y-2">
                        <div class="flex items-start">
                            <i class="fas fa-circle-dot text-green-500 mt-1 mr-2 text-xs"></i>
                            <span class="text-gray-700">${trip.pickup_address.substring(0, 100)}</span>
                        </div>
                        <div class="flex items-start">
                            <i class="fas fa-flag-checkered text-red-500 mt-1 mr-2 text-xs"></i>
                            <span class="text-gray-700">${trip.dropoff_address.substring(0, 100)}</span>
                        </div>
                    </div>
                    ${trip.driver_name ? `<p class="text-sm text-gray-500 mt-2">Driver: ${trip.driver_name}</p>` : ''}
                </div>
                <div class="text-right">
                    <p class="text-xl font-bold text-blue-600">₦${trip.total_fare}</p>
                    <button onclick="viewTripDetails(${trip.id})" class="mt-2 text-blue-600 hover:underline text-sm">
                        View Details →
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function getStatusColor(status) {
    const colors = {
        'completed': 'bg-green-100 text-green-800',
        'ongoing': 'bg-blue-100 text-blue-800',
        'accepted': 'bg-yellow-100 text-yellow-800',
        'searching': 'bg-purple-100 text-purple-800',
        'cancelled_by_student': 'bg-red-100 text-red-800',
        'cancelled_by_driver': 'bg-red-100 text-red-800'
    };
    return colors[status] || 'bg-gray-100 text-gray-800';
}

function filterTrips(filter) {
    currentFilter = filter;
    
    // Update active tab styling
    document.querySelectorAll('[id^="filter"]').forEach(btn => {
        btn.classList.remove('text-blue-600', 'border-blue-600');
        btn.classList.add('text-gray-600');
    });
    document.getElementById(`filter${filter.charAt(0).toUpperCase() + filter.slice(1)}`).classList.add('text-blue-600', 'border-blue-600');
    
    loadTrips();
}

function viewTripDetails(tripId) {
    window.location.href = `/trips/${tripId}/`;
}

loadTrips();
</script>
{% endblock %}
