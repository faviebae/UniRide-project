{% extends 'base.html' %}

{% block title %}Login - UniRide{% endblock %}

{% block content %}
<div class="login-container">
    <div class="wrapper">
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <h1>Login</h1>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="message-box {% if message.tags == 'error' %}message-error{% elif message.tags == 'success' %}message-success{% else %}message-info{% endif %}">
                        <i class='bx {% if message.tags == 'error' %}bx-error-circle{% elif message.tags == 'success' %}bx-check-circle{% else %}bx-info-circle{% endif %}'></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <div class="input-box">
                <input type="email" name="email" placeholder="Email Address" required>
                <i class='bx bxs-envelope'></i>
            </div>
            
            <div class="input-box">
                <input type="password" name="password" id="password" placeholder="Password" required>
                <i class='bx bxs-lock-alt'></i>
                <button type="button" class="password-toggle" onclick="togglePassword()">
                    <i class='bx bx-show-alt' id="toggleIcon"></i>
                </button>
            </div>
            
            <div class="remember-forgot">
                <label>
                    <input type="checkbox" name="remember"> Remember Me
                </label>
                <a href="{% url 'password_reset' %}">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn">Login</button>
            
            <div class="register-link">
                <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
            </div>
            
            <div class="social-login">
                <div class="divider">
                    <span>Or continue with</span>
                </div>
                <div class="social-buttons">
                    <button type="button" onclick="socialLogin('google')" class="social-btn google-btn">
                        <i class='bx bxl-google'></i>
                        Google
                    </button>
                    <button type="button" onclick="socialLogin('facebook')" class="social-btn facebook-btn">
                        <i class='bx bxl-facebook-circle'></i>
                        Facebook
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
    }

    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 80px);
        background: url("/static/images/bg2.jpg") no-repeat center/cover;
        position: relative;
    }

    /* Wrapper */
    .wrapper {
        width: 420px;
        background: rgba(0, 0, 0, 0.4);
        border: 2px solid rgba(255, 255, 255, .2);
        backdrop-filter: blur(15px);
        color: #fff;
        border-radius: 12px;
        padding: 30px 40px;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
        animation: fadeIn 0.8s ease;
    }

    .wrapper h1 {
        font-size: 36px;
        text-align: center;
        margin-bottom: 10px;
    }

    /* Input box */
    .input-box {
        position: relative;
        width: 100%;
        height: 50px;
        margin: 30px 0;
    }

    .input-box input {
        width: 100%;
        height: 100%;
        background: transparent;
        border: 2px solid rgba(255,255,255, .2);
        border-radius: 40px;
        font-size: 16px;
        color: #fff;
        padding: 0 45px 0 20px;
        outline: none;
        transition: all 0.3s ease;
    }

    .input-box input::placeholder {
        color: rgba(255,255,255,0.8);
    }

    .input-box input:focus {
        border-color: #fff;
        box-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .input-box i {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
        pointer-events: none;
    }

    .password-toggle {
        position: absolute;
        right: 45px;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.7);
        cursor: pointer;
        font-size: 18px;
        transition: color 0.3s;
    }

    .password-toggle:hover {
        color: #fff;
    }

    /* Remember + forgot */
    .remember-forgot {
        display: flex;
        justify-content: space-between;
        font-size: 14.5px;
        margin: -15px 0 15px;
    }

    .remember-forgot label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
    }

    .remember-forgot label input {
        accent-color: #fff;
        width: 16px;
        height: 16px;
        cursor: pointer;
    }

    .remember-forgot a {
        color: #fff;
        text-decoration: none;
        transition: 0.3s;
    }

    .remember-forgot a:hover {
        text-decoration: underline;
        color: #ddd;
    }

    /* Button */
    .btn {
        width: 100%;
        height: 45px;
        background: #fff;
        border: none;
        border-radius: 40px;
        cursor: pointer;
        font-size: 16px;
        color: #333;
        font-weight: 600;
        transition: 0.3s;
        margin-top: 10px;
    }

    .btn:hover {
        background: #ddd;
        transform: scale(1.02);
    }

    .btn:active {
        transform: scale(0.98);
    }

    /* Register link */
    .register-link {
        font-size: 14.5px;
        text-align: center;
        margin: 20px 0 15px;
    }

    .register-link p a {
        color: #fff;
        font-weight: 600;
        text-decoration: none;
        transition: 0.3s;
    }

    .register-link p a:hover {
        text-decoration: underline;
        color: #ddd;
    }

    /* Message boxes */
    .message-box {
        padding: 12px 16px;
        border-radius: 40px;
        margin-bottom: 20px;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        animation: slideIn 0.5s ease;
    }

    .message-box i {
        font-size: 20px;
    }

    .message-error {
        background: rgba(220, 38, 38, 0.9);
        color: #fff;
        border-left: 4px solid #ff4444;
    }

    .message-success {
        background: rgba(34, 197, 94, 0.9);
        color: #fff;
        border-left: 4px solid #00ff88;
    }

    .message-info {
        background: rgba(59, 130, 246, 0.9);
        color: #fff;
        border-left: 4px solid #3b82f6;
    }

    /* Social login */
    .social-login {
        margin-top: 20px;
    }

    .divider {
        text-align: center;
        margin: 15px 0;
        position: relative;
    }

    .divider::before,
    .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 35%;
        height: 1px;
        background: rgba(255,255,255,0.3);
    }

    .divider::before {
        left: 0;
    }

    .divider::after {
        right: 0;
    }

    .divider span {
        background: transparent;
        padding: 0 10px;
        font-size: 12px;
        color: rgba(255,255,255,0.7);
    }

    .social-buttons {
        display: flex;
        gap: 15px;
        margin-top: 10px;
    }

    .social-btn {
        flex: 1;
        height: 42px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 40px;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s ease;
    }

    .social-btn:hover {
        background: rgba(255,255,255,0.25);
        transform: translateY(-2px);
    }

    .social-btn i {
        font-size: 18px;
    }

    .google-btn:hover {
        background: rgba(219, 68, 55, 0.8);
        border-color: #db4437;
    }

    .facebook-btn:hover {
        background: rgba(59, 89, 152, 0.8);
        border-color: #3b5998;
    }

    /* Loading state */
    .btn.loading {
        position: relative;
        color: transparent;
    }

    .btn.loading::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        top: 50%;
        left: 50%;
        margin-left: -10px;
        margin-top: -10px;
        border: 2px solid #333;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.6s linear infinite;
    }

    /* Animations */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    /* Responsive */
    @media (max-width: 480px) {
        .wrapper {
            width: 90%;
            padding: 25px 20px;
            margin: 20px;
        }
        
        .wrapper h1 {
            font-size: 28px;
        }
        
        .social-buttons {
            flex-direction: column;
        }
        
        .input-box {
            margin: 20px 0;
        }
    }
</style>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('bx-show-alt');
            toggleIcon.classList.add('bx-hide');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('bx-hide');
            toggleIcon.classList.add('bx-show-alt');
        }
    }
    
    function socialLogin(provider) {
        window.location.href = `/auth/${provider}/login/`;
    }
    
    // Form submission with loading state
    document.querySelector('form').addEventListener('submit', function(e) {
        const email = document.querySelector('input[name="email"]').value;
        const password = document.querySelector('input[name="password"]').value;
        
        if (!email || !password) {
            e.preventDefault();
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-box message-error';
            messageDiv.innerHTML = '<i class="bx bx-error-circle"></i> Please fill in all fields';
            const form = document.querySelector('form');
            const h1 = form.querySelector('h1');
            h1.insertAdjacentElement('afterend', messageDiv);
            setTimeout(() => messageDiv.remove(), 3000);
            return false;
        }
        
        // Add loading state to button
        const btn = document.querySelector('.btn');
        btn.classList.add('loading');
        btn.disabled = true;
    });
    
    // Add eye icon for password toggle styling
    document.addEventListener('DOMContentLoaded', function() {
        // Add floating label effect (optional enhancement)
        const inputs = document.querySelectorAll('.input-box input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('i').style.opacity = '1';
            });
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.querySelector('i').style.opacity = '0.7';
                }
            });
        });
    });
    
    // Check for URL parameters (for OAuth callbacks)
    const urlParams = new URLSearchParams(window.location.search);
    const error = urlParams.get('error');
    if (error) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'message-box message-error';
        errorDiv.innerHTML = `<i class="bx bx-error-circle"></i> ${decodeURIComponent(error)}`;
        const form = document.querySelector('form');
        const h1 = form.querySelector('h1');
        h1.insertAdjacentElement('afterend', errorDiv);
    }
    
    const success = urlParams.get('success');
    if (success) {
        const successDiv = document.createElement('div');
        successDiv.className = 'message-box message-success';
        successDiv.innerHTML = `<i class="bx bx-check-circle"></i> ${decodeURIComponent(success)}`;
        const form = document.querySelector('form');
        const h1 = form.querySelector('h1');
        h1.insertAdjacentElement('afterend', successDiv);
    }
</script>

<!-- Include Boxicons -->
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
{% endblock %}
