{% extends 'base.html' %}

{% block title %}Forgot Password - UniRide{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
    <h1 class="text-2xl font-bold mb-6 text-center">Forgot Password?</h1>
    <p class="text-gray-600 mb-4 text-center">Enter your email address and we'll send you a link to reset your password.</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
            <input type="email" name="email" required 
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
            Send Reset Link
        </button>
    </form>
    
    <div class="mt-4 text-center">
        <a href="/login/" class="text-blue-600 hover:underline">Back to Login</a>
    </div>
</div>
{% endblock %}
