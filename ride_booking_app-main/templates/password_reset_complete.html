{% extends 'base.html' %}

{% block title %}Password Reset Complete - UniRide{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6 text-center">
    <i class="fas fa-check-circle text-green-500 text-5xl mb-4"></i>
    <h1 class="text-2xl font-bold mb-4">Password Reset Complete</h1>
    <p class="text-gray-600 mb-6">
        Your password has been set. You may go ahead and log in now.
    </p>
    <a href="{% url 'login' %}" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
        Login Now
    </a>
</div>
{% endblock %}
