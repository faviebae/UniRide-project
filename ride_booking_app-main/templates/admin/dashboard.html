{% extends 'base.html' %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto">
    <div class="bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-4">Admin Dashboard</h1>
        
        <div class="border-t border-b py-4 my-4">
            <p><strong>Name:</strong> {{ user.get_full_name }}</p>
            <p><strong>Email:</strong> {{ user.email }}</p>
            <p><strong>Role:</strong> {{ user.role }}</p>
        </div>
        
        <div class="mt-6 flex space-x-4">
            <a href="/admin/" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                Django Super Admin Panel
            </a>
            <a href="/" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700">
                Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
